name: Semantic Release

on:
  push:
    branches: [ master, main ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - run: npm install
      
      - run: npm run build
        env:
          CI: false

      # 1. Set up QEMU and Buildx so multi-arch images actually compile smoothly
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. Log natively into GHCR using standard GitHub Actions
      - name: Log in to GitHub Packages Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 3. Tell the plugin the daemon is already authorized, bypassing its Docker Hub check
          PLUGIN_DOCKER_LOGIN: "false"
          DOCKER_IMAGE: ghcr.io/${{ github.repository }}
